services:
  - type: web
    name: intelliplant-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://intelliplant.vercel.app","https://*.vercel.app","http://localhost:5173","http://localhost:8000"]'
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: CHROMA_DIR
        value: /tmp/chroma_db
      - key: SQLITE_DB
        value: /tmp/intelliplant.db
      - key: KNOWLEDGE_GRAPH_PATH
        value: /tmp/knowledge_graph.json
