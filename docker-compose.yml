version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - intelliplant-data:/app/data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-4o
      - UPLOAD_DIR=/app/data/uploads
      - CHROMA_DIR=/app/data/chroma_db
      - SQLITE_DB=/app/data/intelliplant.db
      - KNOWLEDGE_GRAPH_PATH=/app/data/knowledge_graph.json
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8000
    restart: unless-stopped

volumes:
  intelliplant-data:
